<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="description" content="Personal expense tracking wallet">
    <meta name="theme-color" content="#1a1a1f">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zenith Wallet">
    <meta name="mobile-web-app-capable" content="yes">

    <title>Zenith Wallet</title>

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #1a1a1f;
            --bg-secondary: #252529;
            --bg-tertiary: #2d2d33;
            --bg-card: #323238;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a8;
            --text-muted: #6b6b75;
            --accent-green: #00d68f;
            --accent-green-glow: rgba(0, 214, 143, 0.3);
            --accent-red: #ff4757;
            --accent-red-glow: rgba(255, 71, 87, 0.3);
            --accent-blue: #5b8cff;
            --accent-blue-glow: rgba(91, 140, 255, 0.3);
            --border-color: rgba(255, 255, 255, 0.08);
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .app {
            display: none;
            flex-direction: column;
            height: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 0 16px;
            padding-top: env(safe-area-inset-top, 16px);
            padding-bottom: env(safe-area-inset-bottom, 16px);
        }

        .app.active {
            display: flex;
        }

        /* Auth Screen */
        .auth-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 24px;
        }

        .auth-screen.active {
            display: flex;
        }

        .auth-logo {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #a0a0a8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 48px;
        }

        .auth-form {
            width: 100%;
        }

        .auth-input-group {
            margin-bottom: 16px;
        }

        .auth-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .auth-input {
            width: 100%;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 14px;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            font-family: inherit;
            transition: border-color 0.2s ease;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .auth-input::placeholder {
            color: var(--text-muted);
        }

        .auth-btn {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
            margin-top: 8px;
            background: linear-gradient(145deg, var(--accent-blue) 0%, #4a7ae8 100%);
            color: white;
            box-shadow: 0 8px 24px var(--accent-blue-glow);
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-switch {
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-switch-link {
            color: var(--accent-blue);
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            font-size: inherit;
        }

        .auth-error {
            background: var(--accent-red-glow);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .auth-error.active {
            display: block;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #a0a0a8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-badge {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .date-display {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logout-btn:hover {
            background: var(--bg-tertiary);
            color: var(--accent-red);
        }

        .logout-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(145deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border-radius: 24px;
            padding: 28px 24px;
            margin-bottom: 20px;
            flex-shrink: 0;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(91, 140, 255, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .balance-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .balance-amount {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 20px;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .balance-amount.animate {
            animation: balancePulse 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes balancePulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .currency {
            font-size: 24px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .balance-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .currency-selector {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            font-family: inherit;
            outline: none;
            transition: all 0.2s ease;
        }

        .currency-selector:focus {
            border-color: var(--accent-blue);
        }

        .description-group {
            margin-top: 12px;
        }

        .description-input {
            font-size: 14px !important;
            padding: 14px 16px !important;
        }

        .history-description {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .set-budget-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .set-budget-btn:active {
            transform: scale(0.96);
            background: var(--bg-tertiary);
        }

        .set-budget-btn svg {
            width: 18px;
            height: 18px;
        }

        /* History Section */
        .history-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            margin-bottom: 16px;
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .history-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .clear-btn {
            font-size: 13px;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .clear-btn:active {
            background: var(--bg-tertiary);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .history-list::-webkit-scrollbar {
            display: none;
        }

        .history-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            padding: 20px;
        }

        .history-empty svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .history-empty p {
            font-size: 14px;
        }

        .history-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border-radius: 14px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
            animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .history-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .history-icon.income {
            background: var(--accent-green-glow);
        }

        .history-icon.expense {
            background: var(--accent-red-glow);
        }

        .history-icon svg {
            width: 20px;
            height: 20px;
        }

        .history-icon.income svg {
            color: var(--accent-green);
        }

        .history-icon.expense svg {
            color: var(--accent-red);
        }

        .history-details {
            flex: 1;
            min-width: 0;
        }

        .history-type {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .history-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .history-amount {
            font-size: 16px;
            font-weight: 700;
        }

        .history-amount.income {
            color: var(--accent-green);
        }

        .history-amount.expense {
            color: var(--accent-red);
        }

        /* Action Buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            flex-shrink: 0;
            padding-bottom: 8px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px 24px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        .action-btn.expense-btn {
            background: linear-gradient(145deg, var(--accent-red) 0%, #e6303f 100%);
            color: white;
            box-shadow: 0 8px 24px var(--accent-red-glow);
        }

        .action-btn.income-btn {
            background: linear-gradient(145deg, var(--accent-green) 0%, #00b377 100%);
            color: white;
            box-shadow: 0 8px 24px var(--accent-green-glow);
        }

        .action-btn svg {
            width: 22px;
            height: 22px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 500px;
            padding: 24px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: var(--bg-card);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-prefix {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .modal-input {
            width: 100%;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 20px 20px 20px 72px;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: inherit;
            transition: border-color 0.2s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .modal-input::placeholder {
            color: var(--text-muted);
            font-weight: 500;
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-btn {
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .modal-btn:active {
            transform: scale(0.96);
        }

        .modal-btn.cancel {
            background: var(--bg-card);
            color: var(--text-secondary);
        }

        .modal-btn.confirm {
            background: var(--accent-blue);
            color: white;
        }

        .modal-btn.confirm.green {
            background: var(--accent-green);
        }

        .modal-btn.confirm.red {
            background: var(--accent-red);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: var(--bg-card);
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
        }

        .toast.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Loading */
        .loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            flex-direction: column;
            gap: 16px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg-tertiary);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
    </div>

    <!-- Auth Screen -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-logo">Wallet</div>
        <div class="auth-subtitle">Track your expenses with ease</div>

        <div class="auth-form" id="authForm">
            <div class="auth-error" id="authError"></div>

            <div class="auth-input-group">
                <label class="auth-label" for="authUsername">Username</label>
                <input type="text" class="auth-input" id="authUsername" placeholder="Enter username"
                    autocomplete="username">
            </div>

            <div class="auth-input-group">
                <label class="auth-label" for="authPassword">Password</label>
                <input type="password" class="auth-input" id="authPassword" placeholder="Enter password"
                    autocomplete="current-password">
            </div>

            <div class="auth-input-group" id="confirmPasswordGroup" style="display: none;">
                <label class="auth-label" for="authPasswordConfirm">Confirm Password</label>
                <input type="password" class="auth-input" id="authPasswordConfirm" placeholder="Confirm password"
                    autocomplete="new-password">
            </div>

            <button class="auth-btn" id="authSubmitBtn">Login</button>

            <div class="auth-switch">
                <span id="authSwitchText">Don't have an account?</span>
                <button class="auth-switch-link" id="authSwitchBtn">Create Account</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div class="app" id="mainApp">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">Wallet</div>
                <span class="user-badge" id="userBadge"></span>
            </div>
            <div class="header-right">
                <div class="date-display" id="currentDate"></div>
                <button class="logout-btn" id="logoutBtn" title="Logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Balance Card -->
        <div class="balance-card">
            <div class="balance-header">
                <div class="balance-label">Current Balance</div>
                <select class="currency-selector" id="currencySelector">
                    <option value="EGP">EGP</option>
                    <option value="USD">USD</option>
                    <option value="QAR">QAR</option>
                </select>
            </div>
            <div class="balance-amount" id="balanceAmount">
                <span class="currency" id="currencyDisplay">EGP </span><span id="balanceValue">0.00</span>
            </div>
            <button class="set-budget-btn" id="setBudgetBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M12 20h9" />
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                </svg>
                Set Budget
            </button>
        </div>

        <!-- History Section -->
        <div class="history-section">
            <div class="history-header">
                <h2 class="history-title">History</h2>
                <button class="clear-btn" id="clearHistoryBtn">Clear All</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty" id="emptyState">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <line x1="3" y1="9" x2="21" y2="9" />
                        <line x1="9" y1="21" x2="9" y2="9" />
                    </svg>
                    <p>No transactions yet</p>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="action-btn expense-btn" id="cashOutBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <polyline points="19 12 12 19 5 12" />
                </svg>
                Cash Out
            </button>
            <button class="action-btn income-btn" id="cashInBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5" />
                    <polyline points="5 12 12 5 19 12" />
                </svg>
                Cash In
            </button>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-handle"></div>
            <h3 class="modal-title" id="modalTitle">Set Budget</h3>
            <div class="input-group">
                <span class="input-prefix" id="modalCurrency">EGP</span>
                <input type="text" class="modal-input" id="modalInput" placeholder="0.00" inputmode="decimal">
            </div>
            <div class="input-group description-group" id="descriptionGroup" style="display: none;">
                <input type="text" class="modal-input description-input" id="descriptionInput"
                    placeholder="What was this for? (optional)" maxlength="100">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="modalCancel">Cancel</button>
                <button class="modal-btn confirm" id="modalConfirm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Haptic Trigger for iOS 18+ -->
    <input type="checkbox" id="hapticTrigger" style="position: absolute; opacity: 0; pointer-events: none;" switch>

    <script>
        // State
        let balance = 0;
        let currency = 'EGP';
        let transactions = [];
        let currentUser = null;
        let currentModalType = null;
        let isRegistering = false;

        // Haptic Trigger
        const hapticTrigger = document.getElementById('hapticTrigger');

        function triggerHaptic() {
            // Standard vibration for supported devices (Android)
            if (navigator.vibrate) {
                navigator.vibrate(10);
            }
            // iOS 18+ switch haptic workaround
            if (hapticTrigger) {
                hapticTrigger.checked = !hapticTrigger.checked;
            }
        }

        // Note: Remember token is now handled via HTTP-only cookie (set by server)
        // This survives iOS PWA closes better than localStorage

        // Elements
        const loadingScreen = document.getElementById('loadingScreen');
        const authScreen = document.getElementById('authScreen');
        const mainApp = document.getElementById('mainApp');
        const authError = document.getElementById('authError');
        const authUsername = document.getElementById('authUsername');
        const authPassword = document.getElementById('authPassword');
        const authPasswordConfirm = document.getElementById('authPasswordConfirm');
        const confirmPasswordGroup = document.getElementById('confirmPasswordGroup');
        const authSubmitBtn = document.getElementById('authSubmitBtn');
        const authSwitchBtn = document.getElementById('authSwitchBtn');
        const authSwitchText = document.getElementById('authSwitchText');
        const userBadge = document.getElementById('userBadge');
        const balanceValue = document.getElementById('balanceValue');
        const balanceAmount = document.getElementById('balanceAmount');
        const historyList = document.getElementById('historyList');
        const emptyState = document.getElementById('emptyState');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalInput = document.getElementById('modalInput');
        const modalConfirm = document.getElementById('modalConfirm');
        const toast = document.getElementById('toast');
        const currencySelector = document.getElementById('currencySelector');
        const currencyDisplay = document.getElementById('currencyDisplay');
        const modalCurrency = document.getElementById('modalCurrency');
        const descriptionGroup = document.getElementById('descriptionGroup');
        const descriptionInput = document.getElementById('descriptionInput');

        // API helpers - credentials:include sends cookies automatically
        async function api(endpoint, data = null) {
            const options = {
                method: data ? 'POST' : 'GET',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include' // This sends the HTTP-only cookie
            };
            if (data) options.body = JSON.stringify(data);

            const response = await fetch(`/api/${endpoint}.php`, options);
            return response.json();
        }

        // Format currency
        function formatCurrency(amount) {
            return parseFloat(amount).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // Format time
        function formatTime(date) {
            return new Date(date).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        // Format date for header
        function formatDate(date) {
            return new Date(date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        // Update date display
        function updateDate() {
            document.getElementById('currentDate').textContent = formatDate(new Date());
        }

        // Show toast
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 2000);
        }

        // Show auth error
        function showAuthError(message) {
            authError.textContent = message;
            authError.classList.add('active');
        }

        // Hide auth error
        function hideAuthError() {
            authError.classList.remove('active');
        }

        // Toggle auth mode
        function toggleAuthMode() {
            isRegistering = !isRegistering;
            hideAuthError();
            authUsername.value = '';
            authPassword.value = '';
            authPasswordConfirm.value = '';

            if (isRegistering) {
                confirmPasswordGroup.style.display = 'block';
                authSubmitBtn.textContent = 'Create Account';
                authSwitchText.textContent = 'Already have an account?';
                authSwitchBtn.textContent = 'Login';
            } else {
                confirmPasswordGroup.style.display = 'none';
                authSubmitBtn.textContent = 'Login';
                authSwitchText.textContent = "Don't have an account?";
                authSwitchBtn.textContent = 'Create Account';
            }
        }

        // Handle auth submit
        async function handleAuthSubmit() {
            hideAuthError();
            const username = authUsername.value.trim();
            const password = authPassword.value;
            const passwordConfirm = authPasswordConfirm.value;

            if (!username || !password) {
                showAuthError('Please fill in all fields');
                return;
            }

            if (isRegistering && password !== passwordConfirm) {
                showAuthError('Passwords do not match');
                return;
            }

            authSubmitBtn.disabled = true;
            authSubmitBtn.textContent = isRegistering ? 'Creating...' : 'Logging in...';

            try {
                const endpoint = isRegistering ? 'register' : 'login';
                const data = isRegistering
                    ? { username, password, password_confirm: passwordConfirm }
                    : { username, password };

                const result = await api(endpoint, data);

                if (result.success) {
                    // Note: Server sets HTTP-only cookie for remember token automatically
                    currentUser = result.user;
                    balance = result.wallet.balance;
                    currency = result.wallet.currency || 'EGP';
                    transactions = result.wallet.transactions || [];
                    showMainApp();
                    showToast(isRegistering ? 'Account created!' : 'Welcome back!');
                } else {
                    showAuthError(result.error || 'Something went wrong');
                }
            } catch (e) {
                showAuthError('Connection failed. Please try again.');
            }

            authSubmitBtn.disabled = false;
            authSubmitBtn.textContent = isRegistering ? 'Create Account' : 'Login';
        }

        // Show main app
        function showMainApp() {
            loadingScreen.style.display = 'none';
            authScreen.classList.remove('active');
            mainApp.classList.add('active');
            userBadge.textContent = currentUser.username;
            updateDate();
            updateCurrencyDisplay();
            updateBalanceDisplay();
            renderHistory();
        }

        // Show auth screen
        function showAuthScreen() {
            loadingScreen.style.display = 'none';
            mainApp.classList.remove('active');
            authScreen.classList.add('active');
        }

        // Handle logout
        async function handleLogout() {
            try {
                await api('logout', {});
            } catch (e) {
                // Ignore errors
            }
            currentUser = null;
            balance = 0;
            transactions = [];
            showAuthScreen();
            showToast('Logged out');
        }

        // Update balance display
        function updateBalanceDisplay() {
            const formattedBalance = formatCurrency(balance);
            balanceValue.textContent = formattedBalance;

            // Animate
            balanceAmount.classList.remove('animate');
            void balanceAmount.offsetWidth;
            balanceAmount.classList.add('animate');
        }

        // Update currency display
        function updateCurrencyDisplay() {
            currencyDisplay.textContent = currency + ' ';
            modalCurrency.textContent = currency;
            currencySelector.value = currency;
        }

        // Handle currency change - server converts balance and transactions
        async function handleCurrencyChange(newCurrency) {
            try {
                // First change the currency
                const result = await api('currency', { currency: newCurrency });
                if (result.success) {
                    currency = result.currency;
                    balance = result.balance;

                    // Fetch fresh session to get converted transactions
                    const session = await api('session');
                    if (session.success && session.wallet) {
                        transactions = session.wallet.transactions || [];
                    }

                    updateCurrencyDisplay();
                    updateBalanceDisplay();
                    renderHistory();
                    showToast('Currency changed to ' + currency);
                }
            } catch (e) {
                console.error('Currency change failed:', e);
            }
        }

        // Sync transaction to server
        async function syncTransaction(transaction = null, setBudget = null) {
            if (!currentUser) return;
            try {
                const payload = {};
                if (transaction) payload.transaction = transaction;
                if (setBudget !== null) payload.set_budget = setBudget;

                const result = await api('sync', payload);
                if (result.success && result.new_balance !== undefined) {
                    balance = result.new_balance;
                    updateBalanceDisplay();
                }
            } catch (e) {
                console.error('Sync failed:', e);
            }
        }

        // Render history - now uses 'created_at' field from database
        function renderHistory() {
            const items = transactions.map((item, index) => {
                const isIncome = item.type === 'income';
                const dateField = item.created_at || item.date;
                // If description exists, use it as the title; otherwise use Cash In/Out
                const title = item.description || (isIncome ? 'Cash In' : 'Cash Out');
                return `
                    <div class="history-item" style="animation-delay: ${index * 0.05}s">
                        <div class="history-icon ${isIncome ? 'income' : 'expense'}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                ${isIncome
                        ? '<line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>'
                        : '<line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>'
                    }
                            </svg>
                        </div>
                        <div class="history-details">
                            <div class="history-type">${title}</div>
                            <div class="history-time">${formatTime(dateField)}</div>
                        </div>
                        <div class="history-amount ${isIncome ? 'income' : 'expense'}">
                            ${isIncome ? '+' : '-'}${formatCurrency(item.display_amount || item.amount)} ${currency}
                        </div>
                    </div>
                `;
            }).join('');

            if (transactions.length > 0) {
                emptyState.style.display = 'none';
                historyList.innerHTML = items;
            } else {
                emptyState.style.display = 'flex';
                historyList.innerHTML = '';
                historyList.appendChild(emptyState);
            }
        }

        // Open modal
        function openModal(type) {
            currentModalType = type;
            modalInput.value = '';
            descriptionInput.value = '';

            if (type === 'budget') {
                modalTitle.textContent = 'Set Budget';
                modalConfirm.className = 'modal-btn confirm';
                descriptionGroup.style.display = 'none';
            } else if (type === 'income') {
                modalTitle.textContent = 'Cash In';
                modalConfirm.className = 'modal-btn confirm green';
                descriptionGroup.style.display = 'block';
            } else if (type === 'expense') {
                modalTitle.textContent = 'Cash Out';
                modalConfirm.className = 'modal-btn confirm red';
                descriptionGroup.style.display = 'block';
            }

            modalOverlay.classList.add('active');
            setTimeout(() => modalInput.focus(), 350);
        }

        // Close modal
        function closeModal() {
            modalOverlay.classList.remove('active');
            currentModalType = null;
            descriptionInput.value = '';
        }

        // Handle confirm
        function handleConfirm() {
            const value = parseFloat(modalInput.value);

            if (isNaN(value) || value <= 0) {
                showToast('Please enter a valid amount');
                return;
            }

            let newTransaction = null;

            if (currentModalType === 'budget') {
                balance = value;
                showToast('Budget updated!');
                syncTransaction(null, value); // Set budget in current currency
            } else if (currentModalType === 'income') {
                balance += value;
                const desc = descriptionInput.value.trim() || null;
                newTransaction = {
                    type: 'income',
                    amount: value,
                    description: desc,
                    original_currency: currency,
                    created_at: new Date().toISOString()
                };
                transactions.unshift(newTransaction);
                showToast('Cash in successful!');
                syncTransaction(newTransaction);
            } else if (currentModalType === 'expense') {
                if (value > balance) {
                    showToast('Insufficient balance!');
                    return;
                }
                balance -= value;
                const desc = descriptionInput.value.trim() || null;
                newTransaction = {
                    type: 'expense',
                    amount: value,
                    description: desc,
                    original_currency: currency,
                    created_at: new Date().toISOString()
                };
                transactions.unshift(newTransaction);
                showToast('Cash out successful!');
                syncTransaction(newTransaction);
            }

            updateBalanceDisplay();
            renderHistory();
            closeModal();
        }

        // Clear history - disabled for now since we're using proper database
        function clearHistory() {
            showToast('History is stored permanently');
        }

        // Event Listeners
        authSwitchBtn.addEventListener('click', toggleAuthMode);
        authSubmitBtn.addEventListener('click', handleAuthSubmit);
        authPassword.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !isRegistering) handleAuthSubmit();
        });
        authPasswordConfirm.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && isRegistering) handleAuthSubmit();
        });

        document.getElementById('logoutBtn').addEventListener('click', handleLogout);
        document.getElementById('setBudgetBtn').addEventListener('click', () => openModal('budget'));
        document.getElementById('cashInBtn').addEventListener('click', () => openModal('income'));
        document.getElementById('cashOutBtn').addEventListener('click', () => openModal('expense'));
        document.getElementById('modalCancel').addEventListener('click', closeModal);
        document.getElementById('modalConfirm').addEventListener('click', handleConfirm);
        document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);
        currencySelector.addEventListener('change', (e) => handleCurrencyChange(e.target.value));

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        modalInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleConfirm();
            if (e.key === 'Escape') closeModal();
        });

        // Attach haptic feedback to ALL buttons and interactive elements
        document.addEventListener('click', (e) => {
            const target = e.target.closest('button, .action-btn, .set-budget-btn, .modal-btn, .currency-selector');
            if (target) {
                triggerHaptic();
            }
        });

        // Check session on load - uses remember token for iOS PWA
        async function checkSession() {
            try {
                const result = await api('session');
                if (result.success && result.authenticated) {
                    currentUser = result.user;
                    balance = result.wallet.balance;
                    currency = result.wallet.currency || 'EGP';
                    transactions = result.wallet.transactions || [];
                    showMainApp();
                } else {
                    showAuthScreen();
                }
            } catch (e) {
                showAuthScreen();
            }
        }

        // Initialize
        checkSession();

        // Update date at midnight
        setInterval(updateDate, 60000);
    </script>
</body>

</html>
